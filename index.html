<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doble Z — Cosas ricas en frascos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root {
    --cream: #F5F0E8;
    --cream-dark: #EDE6D6;
    --gold: #B8960C;
    --gold-light: #D4AF37;
    --olive: #4A4A2A;
    --olive-dark: #2E2E1A;
    --charcoal: #1C1C1C;
    --warm-white: #FDFAF5;
    --text-main: #1C1C1C;
    --text-sub: #5A5040;
    --text-muted: #8A7A60;
    --border: rgba(184,150,12,0.2);
    --border-strong: rgba(184,150,12,0.4);
    --shadow: 0 4px 24px rgba(28,28,28,0.08);
    --shadow-lg: 0 12px 48px rgba(28,28,28,0.14);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Jost', sans-serif;
    background: var(--cream);
    color: var(--text-main);
    min-height: 100vh;
  }

  /* HERO */
  .hero {
    background: var(--charcoal);
    padding: 3.5rem 2rem 2.5rem;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(184,150,12,0.08) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 30%, rgba(74,74,42,0.15) 0%, transparent 60%);
  }
  .hero-inner { position: relative; z-index: 1; }
  .hero-tag {
    font-family: 'Jost', sans-serif;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--gold-light);
    margin-bottom: 1rem;
  }
  .hero-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(3rem, 8vw, 5rem);
    font-weight: 600;
    color: var(--warm-white);
    line-height: 0.95;
    margin-bottom: 0.5rem;
    letter-spacing: -1px;
  }
  .hero-title span { color: var(--gold-light); font-style: italic; }
  .hero-sub {
    font-size: 13px;
    font-weight: 300;
    color: rgba(255,255,255,0.5);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 2rem;
  }
  .hero-badges { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; }
  .badge {
    border: 1px solid rgba(184,150,12,0.35);
    color: rgba(255,255,255,0.65);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 5px 14px;
    border-radius: 2px;
  }

  /* MAIN LAYOUT */
  .main { max-width: 1100px; margin: 0 auto; padding: 2.5rem 1.5rem; }

  /* FILTERS */
  .filter-row {
    display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 2rem;
    border-bottom: 1px solid var(--border); padding-bottom: 1.5rem;
  }
  .cat-btn {
    font-family: 'Jost', sans-serif;
    background: transparent;
    border: 1px solid var(--border-strong);
    color: var(--text-sub);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 7px 18px;
    border-radius: 2px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .cat-btn:hover { border-color: var(--gold); color: var(--gold); }
  .cat-btn.active { background: var(--charcoal); color: var(--gold-light); border-color: var(--charcoal); }

  /* SECTION LABEL */
  .section-label {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.6rem;
    font-weight: 500;
    color: var(--olive-dark);
    margin-bottom: 1.5rem;
    font-style: italic;
  }

  /* PRODUCT GRID */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1px; margin-bottom: 3rem; background: var(--border); border: 1px solid var(--border); }

  .card {
    background: var(--warm-white);
    padding: 1.5rem 1.25rem 1.25rem;
    transition: background 0.2s;
    display: flex; flex-direction: column;
  }
  .card:hover { background: #FFFDF8; }

  .card-emoji {
    width: 52px; height: 52px;
    margin-bottom: 1rem;
    image-rendering: crisp-edges;
  }
  .card-name {
    font-family: 'Jost', sans-serif;
    font-size: 13px;
    font-weight: 500;
    line-height: 1.4;
    margin-bottom: 4px;
    color: var(--text-main);
    flex: 1;
  }
  .card-desc {
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.5px;
    margin-bottom: 12px;
  }
  .card-price {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.3rem;
    font-weight: 600;
    color: var(--olive-dark);
    margin-bottom: 12px;
  }
  .btn-add {
    font-family: 'Jost', sans-serif;
    width: 100%;
    background: var(--charcoal);
    color: var(--gold-light);
    border: none;
    padding: 9px 0;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 2px;
    transition: background 0.2s;
  }
  .btn-add:hover { background: var(--olive-dark); }

  /* CART */
  .cart-section {
    background: var(--warm-white);
    border: 1px solid var(--border-strong);
    padding: 2rem;
    margin-bottom: 1.5rem;
  }
  .cart-head {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 1.25rem;
    border-bottom: 1px solid var(--border); padding-bottom: 1rem;
  }
  .cart-head-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.4rem; font-weight: 500; font-style: italic;
    color: var(--olive-dark);
  }
  .cart-head-count { font-size: 11px; color: var(--text-muted); letter-spacing: 1px; text-transform: uppercase; }
  .cart-empty { font-size: 13px; color: var(--text-muted); text-align: center; padding: 1.5rem 0; letter-spacing: 0.5px; }
  .cart-item {
    display: flex; align-items: center; padding: 10px 0;
    border-bottom: 1px solid var(--border); font-size: 13px;
  }
  .cart-item:last-child { border-bottom: none; }
  .ci-name { flex: 1; color: var(--text-main); line-height: 1.4; }
  .ci-qty { display: flex; align-items: center; gap: 10px; margin: 0 16px; }
  .qty-btn {
    background: var(--cream); border: 1px solid var(--border-strong);
    width: 24px; height: 24px; cursor: pointer; font-size: 15px;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-main); border-radius: 2px; transition: background 0.15s;
  }
  .qty-btn:hover { background: var(--cream-dark); }
  .ci-price { font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; font-weight: 600; min-width: 80px; text-align: right; color: var(--olive-dark); }
  .cart-total-row {
    display: flex; justify-content: space-between; align-items: baseline;
    padding-top: 1rem; margin-top: 0.5rem;
    border-top: 2px solid var(--charcoal);
  }
  .cart-total-label { font-size: 11px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: var(--text-sub); }
  .cart-total-val { font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; font-weight: 600; color: var(--olive-dark); }

  /* WA BUTTON */
  .btn-wa {
    font-family: 'Jost', sans-serif;
    width: 100%;
    background: #128C7E;
    color: white;
    border: none;
    padding: 16px 0;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 10px;
    transition: background 0.2s;
    margin-bottom: 3rem;
  }
  .btn-wa:hover { background: #075E54; }
  .btn-wa:disabled { background: #aaa; cursor: not-allowed; }

  /* FOOTER */
  .footer {
    border-top: 1px solid var(--border);
    padding: 2rem 0;
    text-align: center;
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }

  /* TOAST */
  .toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--charcoal); color: var(--gold-light);
    padding: 10px 20px; font-size: 12px; letter-spacing: 1px;
    opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 999;
    border-left: 3px solid var(--gold);
  }
  .toast.show { opacity: 1; }

  /* QR MODAL */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(28,28,28,0.7); z-index: 1000;
    align-items: center; justify-content: center;
    backdrop-filter: blur(4px);
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--warm-white);
    padding: 2.5rem;
    max-width: 340px; width: 90%;
    text-align: center;
    position: relative;
  }
  .modal-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.5rem; font-weight: 500; font-style: italic;
    color: var(--olive-dark); margin-bottom: 0.4rem;
  }
  .modal-sub { font-size: 11px; color: var(--text-muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 1.5rem; }
  #qrcode { display: flex; justify-content: center; margin-bottom: 1.5rem; }
  .modal-url {
    font-size: 11px; color: var(--text-sub); letter-spacing: 0.5px;
    word-break: break-all; margin-bottom: 1.5rem;
    padding: 10px; background: var(--cream); border: 1px solid var(--border);
  }
  .modal-close {
    font-family: 'Jost', sans-serif;
    background: var(--charcoal); color: var(--gold-light);
    border: none; padding: 10px 32px;
    font-size: 10px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase;
    cursor: pointer;
  }

  /* QR / SHARE BAR */
  .share-bar {
    display: flex; gap: 10px; margin-bottom: 2.5rem; flex-wrap: wrap;
  }
  .share-btn {
    font-family: 'Jost', sans-serif;
    display: flex; align-items: center; gap: 8px;
    background: var(--warm-white); border: 1px solid var(--border-strong);
    color: var(--text-sub); font-size: 10px; font-weight: 600; letter-spacing: 1.5px;
    text-transform: uppercase; padding: 10px 20px; cursor: pointer;
    border-radius: 2px; transition: all 0.2s;
  }
  .share-btn:hover { background: var(--charcoal); color: var(--gold-light); border-color: var(--charcoal); }
</style>
</head>

</main>

<!-- QR MODAL -->
<div class="modal-overlay" id="modal" onclick="if(event.target===this)closeQR()">

  {id:35, cat:'escabeches', emo:'1f33c', alt:'alcaucil', nombre:'Escabeche de Alcaucil', desc:'450 grs', precio:4800},
];

let carrito = {};
let catActual = 'todas';

const labels = {
  todas:'Toda la línea',
  mermeladas:'Mermeladas — Pura fruta · Sin conservantes',
  aceites:'Aceites & Aceto — 500 ml en vidrio',
  pastas:'Pastas & Delicatessen — 100% naturales',
  aceitunas:'Aceitunas — Artesanales',
  escabeches:'Escabeches — Hechos como en casa',
};

function filterCat(cat, e) {
  catActual = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
  document.getElementById('section-label').textContent = labels[cat];
  renderGrid();
}

function renderGrid() {
  const list = catActual === 'todas' ? productos : productos.filter(p => p.cat === catActual);
  document.getElementById('grid').innerHTML = list.map(p => `
    <div class="card">
      ${emojiImg(p.emo, p.alt)}
      <div class="card-name">${p.nombre}</div>
      <div class="card-desc">${p.desc}</div>
      <div class="card-price">$${p.precio.toLocaleString('es-AR')}</div>
      <button class="btn-add" onclick="addCart(${p.id})">Agregar al pedido</button>
    </div>
  `).join('');
}

function addCart(id) {
  carrito[id] = (carrito[id] || 0) + 1;
  renderCart();
  showToast('Producto agregado');
}

function changeQty(id, d) {
  carrito[id] = (carrito[id] || 0) + d;
  if (carrito[id] <= 0) delete carrito[id];
  renderCart();
}

function renderCart() {
  const ids = Object.keys(carrito);
  const el = document.getElementById('cart-items');
  const tr = document.getElementById('cart-total-row');
  const cc = document.getElementById('cart-count');
  const wb = document.getElementById('wa-btn');

  if (!ids.length) {
    el.innerHTML = '<div class="cart-empty">Agregue productos para comenzar su pedido</div>';
    tr.style.display='none'; cc.textContent=''; wb.disabled=true; return;
  }

  let total=0, qty=0;
  el.innerHTML = ids.map(id => {
    const p = productos.find(x=>x.id==id);
    const sub = p.precio * carrito[id];
    total += sub; qty += carrito[id];
    return `<div class="cart-item">
      <span class="ci-name">${p.nombre}</span>
      <div class="ci-qty">
        <button class="qty-btn" onclick="changeQty(${id},-1)">−</button>
        <span>${carrito[id]}</span>
        <button class="qty-btn" onclick="changeQty(${id},1)">+</button>
      </div>
      <span class="ci-price">$${sub.toLocaleString('es-AR')}</span>
    </div>`;
  }).join('');

  document.getElementById('cart-total').textContent = '$'+total.toLocaleString('es-AR');
  tr.style.display='flex';
  cc.textContent = qty+' producto'+(qty!==1?'s':'');
  wb.disabled=false;
}

function sendWA() {
  const ids = Object.keys(carrito);
  if(!ids.length) return;
  let msg='¡Hola Doble Z! Quiero realizar el siguiente pedido:%0A%0A';
  let total=0;
  ids.forEach(id=>{
    const p=productos.find(x=>x.id==id);
    const sub=p.precio*carrito[id];
    total+=sub;
    msg+=`• ${p.nombre} x${carrito[id]} — $${sub.toLocaleString('es-AR')}%0A`;
  });
  msg+=`%0A*Total: $${total.toLocaleString('es-AR')}*%0A%0A¡Muchas gracias!`;
  window.open(`https://wa.me/${WA}?text=${msg}`,'_blank');
}

function showToast(m) {
  const t=document.getElementById('toast');
  t.textContent=m; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

function copyLink() {
  const url = window.location.href;
  navigator.clipboard.writeText(url).then(()=>showToast('¡Enlace copiado!')).catch(()=>{
    const tmp=document.createElement('input');
    tmp.value=url; document.body.appendChild(tmp);
    tmp.select(); document.execCommand('copy');
    document.body.removeChild(tmp);
    showToast('¡Enlace copiado!');
  });
}

let qrGenerated = false;
function showQR() {
  const url = window.location.href;
  document.getElementById('modal-url').textContent = url;
  if(!qrGenerated) {
    new QRCode(document.getElementById('qrcode'), {
      text: url, width:200, height:200,
      colorDark:'#1C1C1C', colorLight:'#FDFAF5',
      correctLevel: QRCode.CorrectLevel.H
    });
    qrGenerated=true;
  }
  document.getElementById('modal').classList.add('open');
}
function closeQR() { document.getElementById('modal').classList.remove('open'); }

renderGrid();
</script>
</body>
</html>
